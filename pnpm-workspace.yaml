# Pre-approve build scripts for the packages C3 itself installs that need
# them: `workerd` downloads the platform binary, `esbuild` and `sharp`
# (via miniflare) download/build native bindings. Without these, pnpm 11+
# aborts the install with ERR_PNPM_IGNORED_BUILDS.

packages:
  - vendor/*

allowBuilds:
  esbuild: true
  workerd: true
  sharp: true

minimumReleaseAgeExclude:
  - '@biomejs/biome@2.5.4'
  - '@biomejs/cli-darwin-arm64@2.5.4'
  - '@biomejs/cli-darwin-x64@2.5.4'
  - '@biomejs/cli-linux-arm64-musl@2.5.4'
  - '@biomejs/cli-linux-arm64@2.5.4'
  - '@biomejs/cli-linux-x64-musl@2.5.4'
  - '@biomejs/cli-linux-x64@2.5.4'
  - '@biomejs/cli-win32-arm64@2.5.4'
  - '@biomejs/cli-win32-x64@2.5.4'
